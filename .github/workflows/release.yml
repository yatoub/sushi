name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to re-publish (e.g. v0.11.0)"
        required: true

permissions:
  contents: write

jobs:
  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --no-verify --allow-dirty
        continue-on-error: true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: susshi
            asset_name: susshi-linux-amd64
            build_tool: cargo
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu.2.17
            binary_name: susshi
            asset_name: susshi-linux-amd64-glibc217
            build_tool: zigbuild
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: susshi
            asset_name: susshi-linux-amd64-musl
            build_tool: cargo
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: susshi
            asset_name: susshi-macos-amd64
            build_tool: cargo
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: susshi
            asset_name: susshi-macos-arm64
            build_tool: cargo
          # Windows support (optional, but good to have)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: susshi.exe
            asset_name: susshi-windows-amd64.exe
            build_tool: cargo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'x86_64-unknown-linux-gnu.2.17' && 'x86_64-unknown-linux-gnu' || matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install tools for Linux compatibility builds
        if: startsWith(matrix.target, 'x86_64-unknown-linux-')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Setup Zig
        if: matrix.build_tool == 'zigbuild'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install cargo-zigbuild
        if: matrix.build_tool == 'zigbuild'
        shell: bash
        run: cargo install cargo-zigbuild

      - name: Install OpenSSL (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if ([string]::IsNullOrWhiteSpace($vcpkgRoot)) {
            $vcpkgRoot = "C:\\vcpkg"
          }
          $vcpkg = "$vcpkgRoot\\vcpkg.exe"
          if (-not (Test-Path $vcpkg)) {
            Write-Error "vcpkg not found at $vcpkg"
          }
          & $vcpkg install openssl:x64-windows-static-md
          "OPENSSL_NO_VENDOR=1" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENSSL_STATIC=1" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKGRS_DYNAMIC=0" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKGRS_TRIPLET=x64-windows-static-md" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install OpenSSL (macOS x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          rustup target add x86_64-apple-darwin
          # On macos-latest (ARM/M-series), Homebrew lives in /opt/homebrew and only
          # provides ARM binaries. For x86_64 cross-compilation we need a separate
          # x86_64 Homebrew in /usr/local (Rosetta path).
          arch -x86_64 /bin/bash -c \
            "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" \
            < /dev/null
          arch -x86_64 /usr/local/bin/brew install openssl@3
          echo "OPENSSL_DIR=/usr/local/opt/openssl@3" >> $GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV

      - name: Build release
        shell: bash
        run: |
          if [ "${{ matrix.build_tool }}" = "zigbuild" ]; then
            cargo zigbuild --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Check GLIBC compatibility for legacy artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu.2.17'
        shell: bash
        run: |
          max_glibc=$(readelf --version-info target/x86_64-unknown-linux-gnu/release/${{ matrix.binary_name }} \
            | grep -o 'GLIBC_[0-9.]*' \
            | sort -V \
            | tail -1)
          echo "Max GLIBC required: ${max_glibc}"
          if [ "${max_glibc}" != "GLIBC_2.17" ]; then
            echo "Unexpected GLIBC requirement for legacy build"
            exit 1
          fi

      - name: Prepare asset (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          TARGET_DIR="${{ matrix.target }}"
          if [ "${{ matrix.build_tool }}" = "zigbuild" ]; then
            TARGET_DIR="x86_64-unknown-linux-gnu"
          fi
          cp target/${TARGET_DIR}/release/${{ matrix.binary_name }} ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Prepare asset (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} ${{ matrix.asset_name }}

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.asset_name }}
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.event.inputs.tag || github.ref }}
          overwrite: true

  build-deb:
    name: Build DEB packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb and cross
        run: |
          cargo install cargo-deb
          cargo install cross

      - name: Build amd64 DEB
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          cargo deb --no-build --target x86_64-unknown-linux-gnu

      - name: Build arm64 DEB (cross)
        run: |
          cross build --release --target aarch64-unknown-linux-gnu
          cargo deb --no-build --target aarch64-unknown-linux-gnu

      - name: Upload DEBs to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/debian/susshi_*.deb
          file_glob: true
          tag: ${{ github.event.inputs.tag || github.ref }}
          overwrite: true

  build-rpm:
    name: Build RPM package
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install build dependencies
        run: dnf install -y rust cargo openssl-devel zlib-devel pkgconf-pkg-config rpm-build rpmdevtools git

      - name: Setup rpmbuild tree
        run: rpmdev-setuptree

      - name: Patch version in spec
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i "s/^Version:.*/Version:        ${VERSION}/" susshi.spec

      - name: Fetch source archive
        run: spectool -g -R susshi.spec

      - name: Build RPM
        run: rpmbuild -ba susshi.spec
        env:
          OPENSSL_NO_VENDOR: "1"
          LIBZ_SYS_USE_PKG_CONFIG: "1"

      - name: Upload RPMs to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: /github/home/rpmbuild/RPMS/**/*.rpm
          file_glob: true
          tag: ${{ github.event.inputs.tag || github.ref }}
          overwrite: true
