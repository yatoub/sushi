# ==========================================
# sushi - Configuration d'exemple
# ==========================================

# ─── MULTI-FICHIERS (optionnel) ─────────────────────────────────────────────
# Permet de répartir la configuration par équipe ou périmètre.
# Chaque fichier inclus apparaît dans la TUI comme un namespace collapsible (📦).
#
# includes:
#   - label: "DEV"                  # Libellé affiché dans la TUI
#     path: "~/.sushi_dev.yml"      # Chemin absolu ou ~ étendu
#   - label: "QUALITY ASSURANCE"
#     path: "~/.sushi_quality.yml"
#
# Règles :
#   - Les `defaults` d'un fichier inclus sont locaux à ce fichier.
#   - Les includes imbriqués (includes dans un sous-fichier) sont ignorés (v0.7).
#   - Un fichier manquant ou circulaire produit un avertissement non-bloquant.

# 1. Paramètres par défaut (Niveau Global)
# Ces valeurs sont utilisées si elles ne sont pas redéfinies plus bas.
defaults:
  user: "admin"
  ssh_key: "~/.ssh/id_ed25519"
  ssh_port: 22
  ssh_options:
    - "StrictHostKeyChecking=no"
    - "UserKnownHostsFile=/dev/null"
  use_system_ssh_config: false
  # Thème Catppuccin : latte | frappe | macchiato | mocha (défaut)
  theme: mocha
  wallix:
    host: "bastion.example.com"
    user: "bastion"
  # BREAKING CHANGE v0.5.0 : rebond est désormais une LISTE (même pour un seul saut).
  # Ancienne syntaxe (v0.4.x) :
  #   rebond:
  #     host: "jump.example.com"
  #     user: "jump"
  # Nouvelle syntaxe (v0.5.0+) — rebond simple (un saut) :
  jump:
    - host: "jump.example.com"
      user: "jump"
  # Rebond multi-sauts (deux sauts successifs) :
  # rebond:
  #   - host: "jump1.example.com"
  #     user: "jump"
  #   - host: "jump2.example.com"
  #     user: "jump"

  # Points de montage supplémentaires à surveiller lors du diagnostic (`d`).
  # Sémantique : EXTENSION — chaque niveau AJOUTE ses chemins à ceux du parent
  # (contrairement à user/ssh_key qui remplacent).
  # Si un filesystem n'est pas monté sur le serveur, un avertissement ⚠ est affiché
  # à la place de la barre de progression.
  probe_filesystems:
    - "/var/log"
    - "/data"

groups:
  # --- EXEMPLE NIVEAU 3 : Projet -> Environnement -> Serveur ---
  - name: "Projet Alpha"
    user: "dev" # Surcharge le défaut pour tout le projet Alpha
    # Ajoute /app_data aux filesystems définis dans defaults (/var/log, /data).
    # Un serveur de ce groupe avec mode: direct surveillera /var/log, /data ET /app_data.
    probe_filesystems:
      - "/app_data"
    environments:
      - name: "Production"
        servers:
          - name: "nextcloud"
            user: "root"
            host: "192.168.1.13"
            mode: "direct" # Connexion classique
          - name: "db-01"
            host: "192.168.1.11"
            # Ajoute /pg_data au niveau serveur : surveille /var/log, /data, /app_data ET /pg_data.
            probe_filesystems:
              - "/pg_data"
      - name: "Staging"
        servers:
          - name: "web-stg"
            host: "192.168.1.20"
            mode: "jump" # Passe par un serveur de rebond
  # --- EXEMPLE NIVEAU 2 : Groupe -> Serveur ---
  - name: "Infrastructure"
    servers:
      - name: "proxmox-host"
        host: "192.168.1.100"
        mode: "direct"
      - name: "internal-nas"
        host: "192.168.1.200"
        user: "root"
        mode: "bastion" # Passe par un bastion dédié
  # --- EXEMPLE NIVEAU 1 : Serveur Unique ---
  - name: "Raspberry-Pi-Home"
    host: "raspberrypi.local"
    user: "pi"
    mode: "direct"
      